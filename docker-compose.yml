services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    working_dir: /var/www/html
    environment:
      DB_HOST: db
      DB_NAME: mockpsps
      DB_USER: mockpsps
      DB_PASS: secret
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: mockpsps
      MYSQL_USER: mockpsps
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vendor_data:
  db_data:
